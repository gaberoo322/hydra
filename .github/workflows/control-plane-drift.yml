name: control-plane-drift

# Advisory drift check for the Orchestrator control-plane census (issue #2611,
# epic #2607).
#
# dashboard/src/data/control-plane.json is a GENERATED artifact — parsed from
# three authoritative repo sources (scripts/autopilot/classes.json,
# docs/operator-playbooks/hydra-autopilot.md, docs/agents/triage-labels.md) by
# dashboard/scripts/parse-control-plane.mjs. Because it is committed rather than
# built at runtime, it can rot silently when the source taxonomy/labels change
# but nobody regenerates it. This job re-parses the sources in `--check` mode and
# FAILS if the committed JSON differs, turning skeleton drift into a loud,
# deliberate `node dashboard/scripts/parse-control-plane.mjs && commit` step
# instead of a stale map — the exact drift class the skills-mirror hit in PR #2551.
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml — because
# ci.yml is part of the Verifier Core (ADR-0001 / ADR-0015: "the gate that gates
# the gate", operator-only / Tier-4 exact-match). A generated-artifact freshness
# check is a NEW verification, not a change to the merge gate, so it lands as a
# normal Tier-3 sibling — the same pattern ast-grep-lint.yml, comby-check.yml,
# seam-checks.yml, lockfile-lint.yml, and test-typecheck.yml already follow
# (operator memory feedback_ci_gate_separate_workflow_avoids_tier0). It is NOT a
# required branch-protection context, so — like its advisory siblings — it
# surfaces staleness without being able to hard-block auto-merge; it exits
# non-zero on drift so the red X and log point straight at the regenerate step.
#
# The check runs on pure Node stdlib (the parse script has zero runtime deps,
# ADR-0005 / allow-scripts posture, same as build-spritesheet.js), so there is no
# `npm ci` — `actions/checkout` + the pinned self-hosted runner's node is enough.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: control-plane-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  control-plane-drift:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Re-parse control-plane census and diff against the committed JSON
        # `--check` re-parses the repo sources and compares against
        # dashboard/src/data/control-plane.json WITHOUT writing; it exits 1 (with
        # a "regenerate with ..." message) when the committed copy is stale.
        run: node dashboard/scripts/parse-control-plane.mjs --check
