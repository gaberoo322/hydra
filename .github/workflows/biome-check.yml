name: biome-check

# Advisory lint diagnostics over the orchestrator src/ tree (issue #2204,
# tool-scout: lsp-language-tooling).
#
# Runs biome (biomejs/biome) over src/ against the rule set in biome.jsonc, via
# the thin wrapper scripts/ci/biome-check.ts. Before this the src/ tree had ZERO
# linter — only `tsc --noEmit`. biome's `--reporter=json` emits a stable, machine
# -readable diagnostic schema (category / location / severity per finding) that an
# agent can pattern-match WITHOUT an LLM parse, giving a fast in-loop lint signal.
#
# DIAGNOSTICS ONLY — biome.jsonc ships formatter.enabled:false and
# assist.enabled:false, so biome can never rewrite a byte of source. This repo has
# no formatter (no prettier, no .editorconfig), so biome is a NON-conflicting
# advisory linter, NOT a formatter fighting an existing one. tsc --noEmit stays the
# type-checker. The dashboard/ tree keeps its own eslint — the wrapper only ever
# passes src/, never dashboard/.
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml — because
# ci.yml is exact-match Verifier Core (ADR-0001/ADR-0015: "the gate that gates the
# gate", operator-only / Tier-4). A new linter is a *new verification*, not a change
# to the merge gate, so it lands as a normal Tier-3 sibling — the same pattern
# ast-grep-lint.yml, comby-check.yml, dep-boundary-check.yml, seam-checks.yml, and
# lockfile-lint.yml already follow (operator memory
# feedback_ci_gate_separate_workflow_avoids_tier0). Adding/tightening a rule later is
# one edit to biome.jsonc — still T3, zero Tier-4 contact.
#
# ADVISORY by design (issue #2204 risk note: "advisory only on first merge; operator
# upgrades later"): every rule in biome.jsonc ships at `warn`, and the wrapper here
# is run WITHOUT --error, so it emits GitHub annotations + a step summary and exits 0
# regardless of findings. It surfaces lint drift to reviewers WITHOUT blocking merge,
# mirroring ast-grep-lint.yml / comby-check.yml / dep-boundary-check.yml. To promote a
# rule to a hard gate later: bump its severity to `error` in biome.jsonc AND add
# --error to the wrapper invocation below (a conscious, reviewable change).
#
# biome is invoked via the pinned `npx -p @biomejs/biome@<ver>` inside the wrapper
# script — NOT a package.json dependency. @biomejs/biome has NO install/postinstall/
# prepare scripts, so it neither lands on the ADR-0005 runtime-dep allowlist nor trips
# the @lavamoat/allow-scripts gate. Same lane as ast-grep / comby / probe / promptfoo /
# dependency-cruiser. The pinned version lives once in BIOME_SPEC inside
# scripts/ci/biome-check.ts.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: biome-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  biome-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: biome lint diagnostics (advisory; rules in biome.jsonc)
        run: npx tsx scripts/ci/biome-check.ts
