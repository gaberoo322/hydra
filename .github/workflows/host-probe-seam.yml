name: host-probe-seam

# Host-Probe-Seam gate (issue #939). The Host-Probe Adapter Seam
# (src/host-probe/*) owns the host-info external-process boundary —
# df/free/systemctl — behind one private spawn primitive, a sibling to the
# GitHub CLI Adapter (src/github/*, gh/git). This gate freezes the drift: a
# shrink-only baseline tolerates today's known violations (seeded at zero) and
# fails any NEW raw `node:child_process` import that shells out to a host-info
# binary outside src/host-probe/.
#
# It complements github-seam.yml rather than duplicating it: github-seam-check
# carves OUT src/host-probe/* (a host spawn there is not a gh/git violation), so
# it can no longer catch a NEW host-binary spawn landing elsewhere. This ratchet
# is the guard for that direction. With both, every node:child_process import in
# src/ is owned by exactly one Seam or one of three acknowledged exceptions.
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml — because
# ci.yml is exact-match Verifier Core (ADR-0001/ADR-0015, Tier-4/operator-only).
# A new verification belongs in a sibling workflow that lands as a normal Tier-3
# change. Only ci.yml / deploy.yml are exact-match untouchable. This mirrors the
# github-seam.yml / schema-seam.yml / coupling-check.yml precedent.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: host-probe-seam-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-probe-seam:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Host-probe-seam check (Host-Probe Adapter closure ratchet)
        run: npx tsx scripts/ci/host-probe-seam-check.ts
