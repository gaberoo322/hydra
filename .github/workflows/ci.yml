name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Issue #629: cancel superseded CI runs on the same ref. With a single
# self-hosted runner handling all 7 parallel jobs sequentially, a force-push
# during a rebase used to leave the prior run queued — burning runner
# capacity on a sha nobody cares about anymore. Grouping by workflow + ref
# means each PR keeps at most one in-flight CI run (the newest).
#
# Issue #712: do NOT cancel in-progress runs on master. Two pushes to master
# in quick succession share the same `refs/heads/master` group, so a newer
# merge would cancel the older commit's entire CI run — including its
# `deploy` job — leaving production silently lagging master during a merge
# wave. Gating `cancel-in-progress` on `github.ref != 'refs/heads/master'`
# preserves #629's PR-rebase de-dup (non-master refs still cancel superseded
# runs) while letting every master deploy run to completion (deploys
# serialize on the single self-hosted runner anyway).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

# Minimum permissions required by the workflow:
# - `contents: read` for actions/checkout and `gh pr diff` (REST).
# - `pull-requests: read` for `gh pr view --json body` (GraphQL) used by the
#   mutation-test and scope-check jobs to read the PR body for the `Files in
#   scope` section and the `[quick-fix]` bypass tag. Without this, GraphQL
#   returns "Resource not accessible by integration", PR_BODY arrives empty,
#   and the scope gate spuriously fires as 100% out-of-scope on every PR
#   (regression caught on PR #393 — see issue #382).
# - `issues: read` for `gh issue view --json body` used by scope-check to
#   resolve linked-issue bodies (closes/fixes/resolves #N).
permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - run: npm ci
      - run: npm run typecheck
      - name: Redis-seam check (ADR-0009 closure ratchet)
        run: npx tsx scripts/ci/redis-seam-check.ts
      - name: Skill <-> playbook drift check (#666)
        run: bash scripts/ci/check-skill-playbook-drift.sh
      - name: Run tests and verify count
        run: |
          npm test 2>&1 | tee test-output.txt
          PASS_COUNT=$(grep -oP '^# pass \K[0-9]+' test-output.txt)
          echo "Tests passed: $PASS_COUNT"
          MIN_TESTS=450
          if [ "$PASS_COUNT" -lt "$MIN_TESTS" ]; then
            echo "::error::Test count regression: $PASS_COUNT < $MIN_TESTS minimum"
            exit 1
          fi

  dashboard-build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - run: cd dashboard && npm ci
      - run: cd dashboard && npm run build

  # npm audit gate (issue #479). Fails CI when production dependencies
  # carry `high` or `critical` advisories. We deliberately run `npm audit`
  # against the installed tree (after `npm ci`) so the lockfile's transitive
  # deps are scanned too. Dev-only advisories are excluded via `--omit=dev`
  # — dev tooling drift is a separate concern handled by reviewer
  # judgement, and `npm audit fix` is intentionally NOT run here (out of
  # scope per the issue — manual review only).
  #
  # `npm audit` exits non-zero on findings at or above `--audit-level`, so
  # the step naturally fails the job. We capture `--json` first so we can
  # render a readable advisory table in `GITHUB_STEP_SUMMARY`, then surface
  # the human-readable report in the log via a second invocation. Both runs
  # are cheap (single advisory-DB lookup against the local lockfile).
  npm-audit-orchestrator:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: npm ci

      - name: npm audit (orchestrator, prod deps, high+ only)
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > audit.json
          STATUS=$?
          {
            echo "## npm audit — orchestrator (high+ / critical, prod deps)"
            echo ""
            if [ "$STATUS" -eq 0 ]; then
              echo "No high or critical advisories found."
            else
              echo "Advisories blocking merge:"
              echo ""
              echo "| Package | Severity | Range | Advisories |"
              echo "| --- | --- | --- | --- |"
              # Emit one row per vulnerable package, listing each advisory
              # title + URL. `via` entries may be strings (transitive
              # parent package names) or objects (direct advisory records);
              # we only render the object form here.
              node -e "
                const a = require('./audit.json');
                const v = a.vulnerabilities || {};
                for (const [name, info] of Object.entries(v)) {
                  if (!['high','critical'].includes(info.severity)) continue;
                  const advisories = (info.via || [])
                    .filter(x => typeof x === 'object' && x.url)
                    .map(x => \`[\${x.title || x.source}](\${x.url})\`)
                    .join('<br>') || '(transitive)';
                  console.log(\`| \${name} | \${info.severity} | \${info.range || ''} | \${advisories} |\`);
                }
              "
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Re-run plain to surface the human-readable report in the log.
          npm audit --omit=dev --audit-level=high || true
          exit $STATUS

  npm-audit-dashboard:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: cd dashboard && npm ci

      - name: npm audit (dashboard, prod deps, high+ only)
        run: |
          set +e
          cd dashboard
          npm audit --omit=dev --audit-level=high --json > audit.json
          STATUS=$?
          {
            echo "## npm audit — dashboard (high+ / critical, prod deps)"
            echo ""
            if [ "$STATUS" -eq 0 ]; then
              echo "No high or critical advisories found."
            else
              echo "Advisories blocking merge:"
              echo ""
              echo "| Package | Severity | Range | Advisories |"
              echo "| --- | --- | --- | --- |"
              node -e "
                const a = require('./audit.json');
                const v = a.vulnerabilities || {};
                for (const [name, info] of Object.entries(v)) {
                  if (!['high','critical'].includes(info.severity)) continue;
                  const advisories = (info.via || [])
                    .filter(x => typeof x === 'object' && x.url)
                    .map(x => \`[\${x.title || x.source}](\${x.url})\`)
                    .join('<br>') || '(transitive)';
                  console.log(\`| \${name} | \${info.severity} | \${info.range || ''} | \${advisories} |\`);
                }
              "
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          npm audit --omit=dev --audit-level=high || true
          exit $STATUS

  # Tier gate (issue #243, ADR-0001 + ADR-0004 + ADR-0015 work-order step 3).
  # Classifies changed files into the monotonic Modification Tier ladder
  # T1 (shallowest) → T4 (deepest). Blocks T4 (Verifier Core) PRs unless
  # the `operator-approved` label is present. Echoes the result to the PR
  # step summary so reviewers and agents see it without digging.
  #
  # Live-Gate Invariant (issue #738, ADR-0015 §live-gate invariant): when a
  # PR touches a Verifier Core file (ci.yml, deploy.yml, tier-classify.ts,
  # tier-classifier.ts, untouchable.ts) it is classified by the BASE-ref
  # (currently-deployed / master) copy of the classifier scripts, NOT the
  # PR-head copy. This closes the circularity hole: a PR could otherwise ship
  # a neutered classifier on its head (e.g. one that returns T1 for ci.yml)
  # and thereby verify its own admission. The base-ref classifier — which
  # still works — does the classifying, so a self-weakening gate is still
  # caught. Non-Verifier-Core PRs run the head-ref classifier exactly as
  # today (zero behavior change for the common case). The branching +
  # base-ref extraction lives in scripts/ci/live-gate.sh; see that file's
  # header and ADR-0015 for the full mechanism. DO NOT route Verifier Core
  # PRs back through the head-tree classifier — that re-opens the hole.
  tier-gate:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci

      - name: Compute changed files
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The changed-file LIST is always the PR diff (head vs base). The
          # Live-Gate Invariant moves only the CLASSIFIER LOGIC to base-ref,
          # never the file list — we judge the PR's files, using the old rules.
          gh pr diff --name-only "${{ github.event.pull_request.number }}" > changed-files.txt || \
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt
          echo "Files changed:"
          cat changed-files.txt

      - name: Classify tier (Live-Gate Invariant — base-ref for Verifier Core)
        env:
          OPERATOR_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'operator-approved') }}
        run: |
          set +e
          # Compute the trusted base ref the same rebase-safe way the
          # mutation-test job does: `git merge-base origin/master HEAD`, NOT
          # github.event.pull_request.base.sha (which goes stale on rebased
          # PRs and can point at an old base no longer matching the fork
          # point). This is the live, currently-deployed gate at the fork
          # point, and it tracks master as it advances.
          git fetch origin master --depth=0 || git fetch origin master
          MERGE_BASE="$(git merge-base origin/master HEAD)"
          echo "Live-gate base ref (merge-base origin/master HEAD): $MERGE_BASE"

          # scripts/ci/live-gate.sh decides "Verifier Core PR?" using the
          # BASE-ref isVerifierCore, then classifies with base-ref scripts
          # (Verifier Core PR) or head-ref scripts (everything else). Same
          # JSON shape and exit codes as tier-classify.ts.
          bash scripts/ci/live-gate.sh "$MERGE_BASE" "$OPERATOR_APPROVED" changed-files.txt \
            > tier-result.json 2> tier-stderr.txt
          STATUS=$?
          cat tier-result.json
          {
            echo "## Tier-gate classification"
            echo ""
            echo '```json'
            cat tier-result.json
            echo '```'
            if [ $STATUS -ne 0 ]; then
              echo ""
              echo "### Failure"
              echo ""
              echo '```'
              cat tier-stderr.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Always surface the live-gate diagnostic (which classifier won)
          # and any failure detail in the job log.
          cat tier-stderr.txt >&2
          exit $STATUS

  # Mutation testing gate (issues #382, #653). Re-homes step 6.7 of the
  # in-cycle codex loop (runMutationGate in src/mutation.ts) to CI so every
  # PR — codex, hydra-dev, hydra-target-build, manual — gets the same
  # kill-rate gate after the codex CLI is removed (PR-3).
  #
  # Issue #653 scoped this gate to diff-only:
  # - Diff is computed against `git merge-base origin/master HEAD` so the
  #   set is stable across rebases (an upstream master advance that adds
  #   unrelated files doesn't widen the PR's mutation set).
  # - `scripts/ci/mutation-check.ts` filters to `src/**/*.ts` and emits
  #   `status: "skipped"` with a clear reason when the set is empty
  #   (asset-only / doc-only / dashboard-only PRs). NOT a silent pass.
  #
  # See docs/quality-gates.md for thresholds, overrides, and the
  # [quick-fix] bypass.
  mutation-test:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci

      - name: Compute changed files (diff vs merge-base on master)
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Issue #653: prefer `gh pr diff` (already merge-base scoped). Fall
          # back to a local merge-base computation so the gate stays correct
          # when GH is unreachable or for rebased branches where base.sha is
          # the OLD base ref. We deliberately use `merge-base origin/master
          # HEAD` rather than `BASE_SHA HEAD` because a rebased PR can have a
          # stale base.sha that no longer matches the actual fork point.
          git fetch origin master --depth=0 || git fetch origin master
          if ! gh pr diff --name-only "${{ github.event.pull_request.number }}" > changed-files.txt; then
            MERGE_BASE="$(git merge-base origin/master HEAD)"
            echo "gh pr diff unavailable; falling back to local merge-base: $MERGE_BASE"
            git diff --name-only "$MERGE_BASE"...HEAD > changed-files.txt
          fi
          echo "Files changed:"
          cat changed-files.txt

      - name: Classify PR tier (issue #778 — per-tier mutation floor)
        id: tier
        run: |
          # The mutation floor is tier-dependent (issue #778): T3/T4 diffs
          # must clear a raised floor. Source the tier from the single tier
          # authority — scripts/tier-classify.ts → classifyChange — and pass
          # it to the gate via PR_TIER. No per-path hardcoding in the gate.
          mapfile -t FILES < changed-files.txt
          TIER_JSON="$(npx tsx scripts/tier-classify.ts "${FILES[@]}" 2>/dev/null || echo '{}')"
          PR_TIER="$(printf '%s' "$TIER_JSON" | npx tsx -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const t=JSON.parse(s).tier;process.stdout.write(Number.isInteger(t)?String(t):"3")}catch{process.stdout.write("3")}})')"
          echo "Classified tier: ${PR_TIER}"
          echo "PR_TIER=${PR_TIER}" >> "$GITHUB_ENV"

      - name: Run mutation gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MUTATION_KILL_RATE_FLOOR: ${{ vars.MUTATION_KILL_RATE_FLOOR || '30' }}
          MUTATION_KILL_RATE_FLOOR_T3: ${{ vars.MUTATION_KILL_RATE_FLOOR_T3 || '55' }}
          MUTATION_TIME_BUDGET_MS: ${{ vars.MUTATION_TIME_BUDGET_MS || '540000' }}
        run: |
          set +e
          PR_BODY="$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body')"
          export PR_BODY
          CHANGED_FILES="$(cat changed-files.txt)"
          export CHANGED_FILES
          # PR_TIER is exported into $GITHUB_ENV by the Classify PR tier step.
          npx tsx scripts/ci/mutation-check.ts > mutation-result.json 2> mutation-stderr.txt
          STATUS=$?
          {
            echo "## Mutation gate"
            echo ""
            echo '```json'
            cat mutation-result.json
            echo '```'
            if [ -s mutation-stderr.txt ]; then
              echo ""
              echo "### Notes"
              echo '```'
              cat mutation-stderr.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          cat mutation-result.json
          if [ "$STATUS" -ne 0 ]; then
            cat mutation-stderr.txt >&2
          fi
          exit $STATUS

  # Scope enforcement gate (issue #382, codex cut-over PR-2). Re-homes step
  # 6.9 of the in-cycle codex loop (runScopeEnforcement in
  # src/scope-enforcement.ts) to CI. Reads `Files in scope` from the PR
  # body / linked issue; blocks merge when >80% of files are out-of-scope
  # and there are >3 such files. See docs/quality-gates.md.
  scope-check:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci

      - name: Compute changed files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh pr diff --name-only "${{ github.event.pull_request.number }}" > changed-files.txt || \
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          cat changed-files.txt

      - name: Run scope gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE_OUT_OF_SCOPE_THRESHOLD: ${{ vars.SCOPE_OUT_OF_SCOPE_THRESHOLD || '0.8' }}
          SCOPE_MIN_OUT_OF_SCOPE_COUNT: ${{ vars.SCOPE_MIN_OUT_OF_SCOPE_COUNT || '3' }}
        run: |
          set +e
          PR_NUM=${{ github.event.pull_request.number }}
          PR_BODY="$(gh pr view "$PR_NUM" --json body --jq '.body')"
          export PR_BODY
          # Resolve a linked issue body if the PR closes/fixes/resolves one.
          ISSUE_NUM="$(printf '%s' "$PR_BODY" | grep -oiE '(closes|fixes|resolves)[[:space:]]+#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)"
          ISSUE_BODY=""
          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_BODY="$(gh issue view "$ISSUE_NUM" --json body --jq '.body' 2>/dev/null || true)"
          fi
          export ISSUE_BODY
          CHANGED_FILES="$(cat changed-files.txt)"
          export CHANGED_FILES
          npx tsx scripts/ci/scope-check.ts > scope-result.json 2> scope-stderr.txt
          STATUS=$?
          {
            echo "## Scope gate"
            echo ""
            echo '```json'
            cat scope-result.json
            echo '```'
            if [ -s scope-stderr.txt ]; then
              echo ""
              echo "### Notes"
              echo '```'
              cat scope-stderr.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          cat scope-result.json
          if [ "$STATUS" -ne 0 ]; then
            cat scope-stderr.txt >&2
          fi
          exit $STATUS

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test, dashboard-build, npm-audit-orchestrator, npm-audit-dashboard]
    runs-on: self-hosted
    steps:
      # Issue #631: delegate the full deploy flow (sync → npm ci → sync-skills
      # → dashboard build → autopilot-watchdog install → service restart →
      # health check) to scripts/deploy.sh. Previously the workflow inlined a
      # truncated 5-step version that diverged from the script — most
      # dangerously, the inline path was missing `bash scripts/sync-skills.sh`
      # (the documented step 3 of the deploy flow, introduced in #444 after
      # the 2026-05-15 silent-wedge incident) and missed the
      # hydra-autopilot-watchdog systemd unit install (#508). The script is
      # the single source of truth for what runs on every deploy — manual
      # and automatic must take the same path. The script handles its own
      # `cd "$HYDRA_ROOT"` and master-sync guard internally.
      - name: Deploy
        run: bash /home/gabe/hydra/scripts/deploy.sh
