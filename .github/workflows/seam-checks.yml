name: seam-checks

# Consolidated seam-ratchet workflow (issue #1654; accepted proposal
# .thermonuclear/proposals/consolidate-seam-check-workflows.md). One job runs
# all five non-Redis seam checks as sequential steps — each is a thin Adapter
# over the shared scripts/ci/seam-check-lib.ts engine (#950), needs no npm ci,
# and runs in ~1s. This replaces the four sibling workflows (schema-seam.yml,
# github-seam.yml, host-probe-seam.yml, openviking-seam.yml), collapsing five
# runner-slot schedulings + five checkouts per PR event into one of each.
#
# Shared doctrine (formerly repeated in each sibling's header): every seam
# ratchet lives in a sibling workflow — deliberately NOT inside ci.yml —
# because ci.yml is exact-match Verifier Core (ADR-0001/ADR-0015, "the gate
# that gates the gate", Tier-4/operator-only). A seam scanner is a *new
# verification*, not a change to the merge gate, so it lands as a normal
# Tier-3 change. Only ci.yml / deploy.yml / deep-qa-gate.yml are exact-match
# untouchable. Consolidating siblings into a different sibling preserves that
# invariant: adding seam #6 later is one new step here + its check script +
# baseline — still T3, still zero Tier-4 contact. The redis-seam check stays
# inside Verifier-Core ci.yml, untouched. ADR-0022 §4 already practiced this
# co-location reading by hosting query-seam inside schema-seam.yml.
#
# Each check scans the whole tracked tree against its own shrink-only baseline
# (scripts/ci/<name>-seam-baseline.json), so PR and push behave identically:
# any NEW violation fails the gate with a seam-specific message, and a failed
# step names the exact seam in the step list.
#
# Per-seam provenance:
#   schema-seam     — ADR-0011, #893: every src/api/*.ts req.body read
#                     validates through a src/schemas/<domain>.ts zod safeParse.
#   query-seam      — ADR-0022, #1040: handlers never read req.query.<field>
#                     raw; the whole req.query routes through a schema parse.
#   github-seam     — #899: the GitHub CLI Adapter (src/github/*) owns the
#                     gh/git node:child_process boundary.
#   host-probe-seam — #939: the Host-Probe Adapter (src/host-probe/*) owns the
#                     df/free/systemctl host-info spawn boundary.
#   openviking-seam — #954: the OpenViking Request Adapter
#                     (src/knowledge-base/ov-request.ts) owns the OV fetch()
#                     boundary.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: seam-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  seam-checks:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Schema-seam check (ADR-0011 req.body validation ratchet, #893)
        run: npx tsx scripts/ci/schema-seam-check.ts

      - name: Query-seam check (ADR-0022 req.query validation ratchet, #1040)
        run: npx tsx scripts/ci/query-seam-check.ts

      - name: GitHub-seam check (GitHub CLI Adapter closure ratchet, #899)
        run: npx tsx scripts/ci/github-seam-check.ts

      - name: Host-probe-seam check (Host-Probe Adapter closure ratchet, #939)
        run: npx tsx scripts/ci/host-probe-seam-check.ts

      - name: OpenViking-seam check (OpenViking Request Adapter closure ratchet, #954)
        run: npx tsx scripts/ci/openviking-seam-check.ts
