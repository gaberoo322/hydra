name: deep-qa-gate

# T4 Deep-QA gate (ADR-0020 Slice 1, issue #847).
#
# The required CI check that enforces the SHA-bound Deep-QA PASS marker before
# a Verifier-Core (T4) PR may merge. It is the independent CI enforcement of
# the proof signal that `hydra-qa`'s T4 PASS path posts
# (`Verifier-Core deep-QA: PASS @ <head-sha>`). For non-T4 PRs it reports
# success immediately — it never blocks the ~95% common case.
#
# ## Why two triggers
#
#  - `pull_request`  — fires at open/sync/reopen so the `deep-qa-gate` status
#    exists from the start (initially failing for a T4 PR with no marker yet),
#    and re-evaluates on every push (a new head SHA invalidates a stale
#    marker — the SHA-bound guarantee).
#  - `issue_comment` — fires when QA posts the PASS marker comment, flipping
#    the status green WITHOUT requiring a new push. A `pull_request`-only gate
#    would be permanently red on a T4 PR, because the marker is posted AFTER
#    PR-open (ADR-0020 Decision 4). Filtered to PR comments via
#    `github.event.issue.pull_request`.
#
# ## Base-ref protection for free (ADR-0020 Decision 4)
#
# GitHub runs `issue_comment`-triggered workflows from the DEFAULT branch's
# copy of this file, never the PR head — so the `issue_comment` arm's gate
# logic is base-ref-protected for free (the same Live-Gate Invariant the
# `tier-gate` job buys with explicit base-ref extraction; here the platform
# hands it to us). The `pull_request` arm DOES run the PR-head copy, so this
# workflow is registered in `VERIFIER_CORE_PATHS` (src/untouchable.ts) — a PR
# editing it classifies T4 and is base-ref-classified by the live tier-gate,
# preventing a PR from neutering its own gate logic on its head.
#
# ## Status mechanism
#
# Reports a commit STATUS (not a check-run) named exactly `deep-qa-gate`
# against the PR head SHA via the commit-status REST API
# (`POST /repos/{owner}/{repo}/statuses/{sha}`). A commit status is the right
# primitive for a tier-conditional required check: a status the workflow
# reports on demand can be set `success` for non-T4 PRs immediately, whereas a
# branch-protection-required *check-run* that this workflow never produces for
# non-T4 PRs would leave them blocked forever. The operator adds `deep-qa-gate`
# to branch-protection required checks AFTER this lands (the ADR-0020 ordering
# invariant); until then the status reports but does not block.
#
# ## CheckRun rollup mirror (issue #868)
#
# The commit STATUS above is the SINGLE authoritative, branch-protection-required
# primitive. But the PR checks ROLLUP (`statusCheckRollup`, which the autopilot
# and the GitHub UI read) keys the latest result for the name `deep-qa-gate` off
# whichever of {StatusContext, CheckRun} concluded most recently. The
# `pull_request` arm at PR-open emits its own CheckRun named `deep-qa-gate` (the
# Actions run itself); for a T4 PR that arm initially reports red (no marker yet)
# and is then CANCELLED by the shared concurrency group when the `issue_comment`
# arm fires on the PASS marker — so the rollup can keep showing that
# stale/cancelled CheckRun as the latest `deep-qa-gate` entry even though the
# commit status is green (the #859 dogfood; memory note
# reference_deep_qa_gate_checkrun_vs_status).
#
# Fix: the `issue_comment` arm — which runs the base-ref (default-branch) copy,
# so it is base-ref-protected for free — ALSO creates a CheckRun named
# `deep-qa-gate` on the RESOLVED head SHA, mirroring the just-computed STATE.
# Because it concludes AFTER the cancelled `pull_request`-arm CheckRun, it
# becomes the latest result for the name and the rollup entry is unambiguous.
# This CheckRun is an ADVISORY mirror: it always reports the SAME state as the
# commit status and never contradicts it; the commit status stays the only
# branch-protection-required check (making the CheckRun a second required check
# would re-introduce the non-T4-blocked-forever risk ADR-0020 Decision 4
# rejected). Creating a CheckRun needs the `checks: write` scope — a THIRD scope
# distinct from `statuses: write` (the commit-status primitive) and `contents` —
# added as an additive extend below.

on:
  issue_comment:
    types: [created, edited]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

# Cancel superseded runs on the same PR (mirrors ci.yml's PR de-dup). Group by
# PR number so the issue_comment and pull_request arms for one PR share a lane.
concurrency:
  group: deep-qa-gate-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

# - statuses: write is required to POST a commit status — the gate's whole job
#   (the commit-status REST API needs the `statuses` scope, NOT `contents`).
# - checks: write is required to create the advisory CheckRun rollup mirror
#   (issue #868). The Checks API (`POST /repos/{owner}/{repo}/check-runs`) needs
#   the `checks` scope — a THIRD scope distinct from `statuses` and `contents`.
#   The commit STATUS stays the only branch-protection-required primitive.
# - contents: read for actions/checkout.
# - pull-requests: read for `gh pr view --json comments,headRefOid`.
permissions:
  contents: read
  pull-requests: read
  statuses: write
  checks: write

jobs:
  deep-qa-gate:
    # On issue_comment, only run for comments on PRs (not plain issues).
    if: ${{ github.event_name == 'pull_request' || github.event.issue.pull_request }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci

      - name: Evaluate deep-qa-gate and report status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Resolve the PR's CURRENT head SHA + changed files + comment bodies.
          # For issue_comment events there is no PR object on the event, so we
          # resolve everything from the PR number via the API.
          HEAD_SHA="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')"
          echo "PR #$PR_NUMBER head SHA: $HEAD_SHA (event: $EVENT_NAME)"

          gh pr diff --name-only "$PR_NUMBER" --repo "$REPO" > changed-files.txt
          echo "Changed files:"
          cat changed-files.txt

          # Classify the PR's tier using the head-tree classifier. (This arm
          # only runs the head copy on pull_request; the issue_comment arm runs
          # the default-branch copy — base-ref-protected for free. Either way
          # the SAME classifier authority is used, scripts/tier-classify.ts.)
          mapfile -t FILES < <(grep -v '^[[:space:]]*$' changed-files.txt || true)
          TIER_JSON="$(npx tsx scripts/tier-classify.ts "${FILES[@]}" 2>/dev/null || echo '{}')"
          echo "Tier classification: $TIER_JSON"
          PR_TIER="$(printf '%s' "$TIER_JSON" | jq -r '.tier // empty' 2>/dev/null || true)"
          echo "PR tier: ${PR_TIER:-unknown}"

          STATE="failure"
          DESCRIPTION=""

          if [ "$PR_TIER" != "4" ]; then
            # Non-T4: the deep-qa-gate does not apply — report success at once.
            STATE="success"
            DESCRIPTION="Non-T4 PR — deep-QA gate not required."
          else
            # T4: pass IFF a fresh Deep-QA PASS marker (matching THIS head SHA)
            # is present in the PR comments. Uses the shared pure helper so the
            # marker literal is defined once (scripts/ci/qa-verdict.ts).
            gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
              --jq '[.comments[].body]' > pr-comments.json
            FRESH="$(HEAD_SHA="$HEAD_SHA" node --no-warnings --experimental-strip-types -e "
              import('./scripts/ci/qa-verdict.ts').then(async ({hasFreshDeepQaPass}) => {
                const fs = await import('node:fs');
                const comments = JSON.parse(fs.readFileSync('pr-comments.json','utf8'));
                process.stdout.write(hasFreshDeepQaPass(comments, process.env.HEAD_SHA) ? 'yes' : 'no');
              });
            ")"
            echo "Fresh Deep-QA PASS marker present for $HEAD_SHA: $FRESH"
            if [ "$FRESH" = "yes" ]; then
              STATE="success"
              DESCRIPTION="T4 deep-QA PASS marker present for current head SHA."
            else
              STATE="failure"
              DESCRIPTION="T4 PR missing a Verifier-Core deep-QA PASS marker for the current head SHA."
            fi
          fi

          echo "Reporting deep-qa-gate=$STATE on $HEAD_SHA: $DESCRIPTION"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="$STATE" \
            -f context="deep-qa-gate" \
            -f description="$DESCRIPTION"

          # CheckRun rollup mirror (issue #868). The commit status above is the
          # single branch-protection-required primitive; this CheckRun is an
          # ADVISORY mirror that reports the SAME state so the PR checks rollup's
          # latest `deep-qa-gate` entry is unambiguous and supersedes any
          # stale/cancelled `pull_request`-arm CheckRun. Emit it ONLY from the
          # issue_comment arm: that arm runs the base-ref (default-branch) copy
          # (base-ref-protected for free) and fires AFTER the cancelled
          # pull_request-arm CheckRun, so its CheckRun becomes the latest result
          # for the name. The pull_request arm already produces its own
          # like-named CheckRun (the Actions run) and re-runs on every push, so
          # emitting a second one there is redundant.
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            # Map the commit-status STATE onto a CheckRun conclusion; the
            # CheckRun must NEVER contradict the status.
            if [ "$STATE" = "success" ]; then
              CHECK_CONCLUSION="success"
            else
              CHECK_CONCLUSION="failure"
            fi
            echo "Mirroring deep-qa-gate CheckRun=$CHECK_CONCLUSION on $HEAD_SHA"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/check-runs" \
              -f name="deep-qa-gate" \
              -f head_sha="$HEAD_SHA" \
              -f status="completed" \
              -f conclusion="$CHECK_CONCLUSION" \
              -f output[title]="deep-qa-gate" \
              -f output[summary]="$DESCRIPTION" \
              || echo "WARN: deep-qa-gate CheckRun mirror failed (non-fatal — the commit status is authoritative)"
          fi

          # Fail the job if the gate is not green, so the run itself is a clear
          # red/green signal in the Actions UI (the required check is the
          # commit status, but a red job is the faster human signal).
          if [ "$STATE" != "success" ]; then
            echo "::error::deep-qa-gate failed: $DESCRIPTION"
            exit 1
          fi
