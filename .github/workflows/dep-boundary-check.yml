name: dep-boundary-check

# Import-graph boundary scan (issue #2205, tool-scout: dependency-hygiene).
#
# Runs dependency-cruiser (sverweij/dependency-cruiser) over the src/ import graph
# against the rule set in .dependency-cruiser.cjs, via the thin wrapper
# scripts/ci/dep-boundary-check.ts. dependency-cruiser reads the ACTUAL import/require
# graph, so a module-boundary name that appears only in a comment or docstring never
# false-matches — the false-positive class the text-regex scripts/ci/*-seam-check.ts
# ratchets live with. One config formalises ALL the src/ module-boundary seams at once
# (Redis keys/kv, ioredis construction, backlog internal helpers, plus cycle detection).
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml — because
# ci.yml is exact-match Verifier Core (ADR-0001/ADR-0015: "the gate that gates the
# gate", operator-only / Tier-4). A new boundary scanner is a *new verification*, not
# a change to the merge gate, so it lands as a normal Tier-3 sibling — the same pattern
# ast-grep-lint.yml, comby-check.yml, seam-checks.yml, and lockfile-lint.yml already
# follow (operator memory feedback_ci_gate_separate_workflow_avoids_tier0). Adding a
# boundary rule later is one edit to .dependency-cruiser.cjs — still T3, zero Tier-4
# contact.
#
# ADVISORY by design (issue #2205 risk note: "start in advisory mode, not err blocking
# mode"): the rules in .dependency-cruiser.cjs all ship at severity "warn", and the
# wrapper here is run WITHOUT --error, so it emits GitHub annotations + a step summary
# and exits 0 regardless of findings. It surfaces import-boundary drift to reviewers
# WITHOUT blocking merge, mirroring ast-grep-lint.yml / comby-check.yml. The
# authoritative HARD gate for the Redis seam stays the text-regex
# scripts/ci/redis-seam-check.ts inside Verifier-Core ci.yml — this complements it, it
# does not replace it. To promote a rule to a hard gate later: flip its severity to
# "error" in the config AND add --error to the wrapper invocation below (a conscious,
# reviewable change).
#
# dependency-cruiser is invoked via the pinned `npx -p dependency-cruiser@<ver>` inside
# the wrapper script — NOT a package.json dependency. dependency-cruiser ships a
# `prepare: husky` install script, so adding it as a dep would trip the
# @lavamoat/allow-scripts gate (deny-all); the npx path runs the binary without ever
# running that script gate. Same ADR-0005 / allow-scripts rationale as ast-grep / comby
# / probe / promptfoo. The pinned version lives once in DEPCRUISE_SPEC inside
# scripts/ci/dep-boundary-check.ts.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: dep-boundary-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dep-boundary-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: dependency-cruiser import-graph scan (advisory; rules in .dependency-cruiser.cjs)
        run: npx tsx scripts/ci/dep-boundary-check.ts
