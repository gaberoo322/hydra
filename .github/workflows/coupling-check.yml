name: coupling-check

# Target-coupling gate (issue #731). Hydra is a swappable single-target builder
# (ADR-0013): the operator swaps targets by editing env vars, never by editing
# `src/`. Hardcoding the target's name, repo slug, or domain vocabulary anywhere
# in `src/` silently breaks that swap model and is a defect (ADR-0002).
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml — because
# ci.yml is part of the Untouchable Core (ADR-0001: "the gate that gates the
# gate", operator-only). A coupling scanner is a *new verification*, not a change
# to the merge gate, so it belongs in a sibling workflow that can land as a
# normal (non-Tier-0) change. Only ci.yml / deploy.yml are exact-match untouchable.
#
# The check itself (scripts/ci/target-coupling-check.ts) scans the whole tracked
# `src/` tree against a shrink-only baseline, so PR and push behave identically:
# any NEW hardcoded target reference in code fails the gate.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: coupling-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coupling-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Target-coupling check (ADR-0013 swap-seam guard)
        run: npx tsx scripts/ci/target-coupling-check.ts

      - name: Self-test the classifier (proves it catches a planted leak)
        run: npx tsx scripts/ci/target-coupling-check.ts --self-test
