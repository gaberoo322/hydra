name: skill-size-ratchet

# Skill-size ratchet (issue #2946, parent epic #2944).
#
# Shrink-only word-count gate over the playbook-generated skill sources:
# frontmattered docs/operator-playbooks/*.md plus _fragments/*.md content
# fragments. Every generated SKILL.md loads into agent context, and every
# frontmatter description loads into EVERY session's skill list — this ratchet
# stops silent growth. The checker (scripts/ci/skill-size-ratchet.ts) compares
# per-file body word counts against the committed baseline
# (scripts/ci/skill-size-baseline.json; equal-or-below passes, growth fails
# unless the baseline entry is deliberately raised in the same PR) and enforces
# a description cap of max(50, grandfathered baseline count).
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml —
# because ci.yml is Verifier Core (ADR-0001/ADR-0015: "the gate that gates the
# gate", operator-only / Tier-4 exact-match). A new verification lands as a
# normal Tier-3 sibling — the ast-grep-lint / comby-check / test-typecheck
# precedent (operator memory feedback_ci_gate_separate_workflow_avoids_tier0).
#
# ADVISORY in the seam-checks sense: the checker exits non-zero on violation
# and this job goes red, but the workflow is never added to required
# branch-protection checks — a red ratchet surfaces the size regression to
# reviewers without blocking auto-merge. (Not the eval-gate exit-0 softening:
# this check is fully deterministic, so muting it would only hide signal.)

on:
  pull_request:
    branches: [master]
    paths:
      - "docs/operator-playbooks/**"
      - "scripts/ci/skill-size-ratchet.ts"
      - "scripts/ci/skill-size-baseline.json"
      - ".github/workflows/skill-size-ratchet.yml"
  push:
    branches: [master]

concurrency:
  group: skill-size-ratchet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  skill-size-ratchet:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (tsx)
        run: npm ci

      - name: Skill-size ratchet (issue #2946 shrink-only word-count baseline)
        run: npx tsx scripts/ci/skill-size-ratchet.ts
