name: lockfile-lint

# Supply-chain lockfile gate (issue #1042 / tool-scout: deterministic-builds).
#
# lockfile-lint validates the committed package-lock.json against integrity
# rules: every resolved package must come from the npm registry over https and
# carry an integrity hash. It reads only the committed lockfile — no install,
# no network — so the same input always produces the same answer.
#
# This lives in its own workflow file — deliberately NOT inside ci.yml — because
# ci.yml is part of the Verifier Core (ADR-0001/ADR-0015: "the gate that gates
# the gate", operator-only / Tier-0 exact-match). A lockfile linter is a *new
# verification*, not a change to the merge gate, so it belongs in a sibling
# workflow that can land as a normal (Tier 2/below) change.
#
# Why this guard: Hydra installs from package-lock.json in CI. An agent-authored
# dep change that silently rewrites a `resolved` URL to a non-canonical host or
# drops an integrity hash would change what CI installs versus what an agent
# tested locally — a green-locally/red-in-CI heisenbug. This turns that into a
# hard, machine-readable CI failure before merge.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: lockfile-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lockfile-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Lint root package-lock.json
        run: |
          npx --yes lockfile-lint@5.0.0 \
            --path package-lock.json \
            --type npm \
            --allowed-hosts npm \
            --validate-https \
            --validate-integrity

      - name: Lint dashboard package-lock.json
        run: |
          npx --yes lockfile-lint@5.0.0 \
            --path dashboard/package-lock.json \
            --type npm \
            --allowed-hosts npm \
            --validate-https \
            --validate-integrity
