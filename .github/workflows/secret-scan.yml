name: secret-scan

# Secret-scan gate (issue #698). The repo went public on 2026-05-28, so a
# leaked credential is now an irreversible incident.
#
# This lives in its own workflow file — deliberately NOT inside ci.yml — because
# ci.yml is part of the Untouchable Core (ADR-0001: "the gate that gates the
# gate", operator-only). A secret scanner is a *new verification*, not a change
# to the merge gate, so it belongs in a sibling workflow that can land as a
# normal (non-Tier-0) change.
#
# On a PR we scan only the changed files (fast, catches new introductions); on
# a push to master we scan the whole tree as a safety net. The scanner prints
# file + line numbers only — never the matched value — because this log is
# public.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for credential-like strings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/ci/secret-scan.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr diff --name-only "${{ github.event.pull_request.number }}" > changed.txt || \
              git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed.txt
            cat changed.txt
            mapfile -t FILES < changed.txt
            if [ "${#FILES[@]}" -eq 0 ]; then
              echo "secret-scan: no changed files."
              exit 0
            fi
            bash scripts/ci/secret-scan.sh "${FILES[@]}"
          else
            bash scripts/ci/secret-scan.sh --all
          fi
