name: ast-grep-lint

# AST-exact structural lint (issue #1797, tool-scout: code-search-infra).
#
# Runs the ast-grep rules under src/ast-grep-rules/ over the source tree.
# ast-grep matches SYNTAX (tree-sitter AST), not text, so these rules never
# mis-fire on a comment or a string literal that merely contains the pattern
# text — the false-positive class that line-regex seam checks live with.
#
# This lives in its own workflow file — deliberately NOT inside ci.yml —
# because ci.yml is part of the Verifier Core (ADR-0001/ADR-0015: "the gate
# that gates the gate", operator-only / Tier-4 exact-match). A new structural
# linter is a *new verification*, not a change to the merge gate, so it lands as
# a normal Tier-3 sibling — the same pattern seam-checks.yml, lockfile-lint.yml,
# and allow-scripts.yml already follow (operator memory
# feedback_ci_gate_separate_workflow_avoids_tier0). Adding a rule later is one
# new file under src/ast-grep-rules/ — still T3, zero Tier-4 contact.
#
# ADVISORY by design: the rules ship at `severity: warning`, and this job runs
# `ast-grep scan --format github` which emits GitHub annotations and exits 0.
# It surfaces structural findings to reviewers WITHOUT blocking merge. The
# authoritative Redis-seam ratchet remains the text-regex redis-seam-check.ts
# inside Verifier-Core ci.yml — this workflow complements it, it does not
# replace it. To promote a rule to a hard gate later, set its rule `severity`
# to `error` and add `--error` here (a conscious, reviewable change).
#
# ast-grep is invoked via `npx -p @ast-grep/cli@<pinned>` rather than a
# package.json dependency: that keeps it off the ADR-0005 runtime-dep allowlist
# AND off the lavamoat allow-scripts gate (the CLI carries a native-binary
# postinstall). The pinned version MUST match scripts/ast-search.ts's
# AST_GREP_SPEC so local and CI runs use the same binary.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ast-grep-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ast-grep-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: ast-grep structural scan (advisory; rules in src/ast-grep-rules/)
        run: npx --yes -p @ast-grep/cli@0.43.0 ast-grep scan --format github
