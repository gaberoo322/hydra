name: github-seam

# GitHub-Seam gate (issue #899). The GitHub CLI Adapter Seam (src/github/*,
# issues #896/#897) owns the gh/git external-process boundary. CONTEXT.md
# predicted — as ADR-0009 (Redis) and ADR-0011 (Schemas) did before it — that
# prose discipline alone keeps the Seam from closing. This gate freezes the
# drift: a shrink-only baseline tolerates today's known violations and fails any
# NEW raw `node:child_process` import outside src/github/.
#
# This lives in its OWN workflow file — deliberately NOT inside ci.yml — because
# ci.yml is exact-match Verifier Core (ADR-0001/ADR-0015, Tier-4/operator-only).
# A github-seam scanner is a *new verification*, not a change to the merge gate,
# so it belongs in a sibling workflow that lands as a normal Tier-3 change. Only
# ci.yml / deploy.yml are exact-match untouchable. This mirrors the
# schema-seam.yml / coupling-check.yml precedent.
#
# The check itself (scripts/ci/github-seam-check.ts) scans the whole tracked
# `src/**/*.ts` tree against a shrink-only baseline, so PR and push behave
# identically: any NEW direct child_process caller fails the gate.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: github-seam-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  github-seam:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: GitHub-seam check (GitHub CLI Adapter closure ratchet)
        run: npx tsx scripts/ci/github-seam-check.ts
