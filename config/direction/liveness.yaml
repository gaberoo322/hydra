# Wiring-liveness manifest — the declared contract for what SHOULD be live.
#
# Issue #2287 (parent epic #2286). This is the source-of-truth git-tracked list
# of critical production entrypoints, each with a check `type`. It is the
# complement to the Outcome Holdback (src/holdback.ts): the holdback watches a
# change that IS live for regressions; wiring-liveness catches a change that
# never went live at all — a declared timer missing from the running systemd
# set, or one that has gone stale past its freshness window.
#
# Target-scoped CONTENT (it enumerates the hydra-betting-* production timers),
# orchestrator-scoped CODE (the chore in src/scheduler/chores/wiring-liveness.ts
# reads it). It lands here beside outcomes.yaml — the Target<->orchestrator
# contract surface — mirroring how src/outcomes.ts reads outcomes.yaml.
#
# Schema (src/schemas/liveness.ts; parsed by a hand-rolled YAML subset, no
# runtime YAML dependency per ADR-0005). Each entry is one of two check types,
# discriminated on `type`:
#
# type: timer  (slice 1, #2287) — a declared systemd --user timer that should be
#   present-and-fresh in the running set:
#     unit             systemd --user timer unit name, including the .timer suffix
#     maxStaleMinutes  freshness window — a timer present in the live set whose
#                      last fire is older than this is flagged STALE. A timer that
#                      has never fired yet (last: 0) is NOT-YET-FIRED, never STALE.
#     description      (optional) why this entrypoint is critical
#
# type: output  (slice 2, #2288) — the live-but-inert failure mode: code runs on
#   schedule but produces zero / floor-pinned output:
#     source           a live source identifier — an Orchestrator API path (e.g.
#                      /api/scanner/latest) or a metric name
#     jsonPath         dotted path into the source's response (e.g.
#                      funnelBreakdown.registryPairs)
#     minOverRuns      the floor: { value, runs }. The chore reads the source's
#                      trailing run-series and flags BELOW-FLOOR only when every
#                      value across the last `runs` observations is <= `value`. A
#                      single value above the floor clears the alert — the check
#                      is stateless, so a recovered source never sticks.
#     description      (optional) why this output is critical
#
# The timer entries (#2287) hand-curate the known-critical Target timers verified
# live via `systemctl --user list-timers`. maxStaleMinutes is set generously above
# each timer's nominal cadence so normal jitter never false-alarms.

entries:
  - unit: hydra-betting-scan.timer
    type: timer
    maxStaleMinutes: 120
    description: Core market-scan loop — the primary betting ingest/scan entrypoint.
  - unit: hydra-betting-alerts.timer
    type: timer
    maxStaleMinutes: 120
    description: Alerting loop for surfaced betting opportunities.
  - unit: hydra-betting-ingest.timer
    type: timer
    maxStaleMinutes: 360
    description: Upstream data ingest for the betting pipeline.
  # NOTE: hydra-betting-arbitrage-auto-approval.timer and
  # hydra-betting-automated-pair-review.timer were removed here — they belong to
  # the cross-venue arbitrage strategy retired by hydra-betting ADR-0002. The
  # automated-pair-review runner was deleted (betting PR #318); arbitrage
  # auto-approval is a default-off dispatcher, never a must-be-live entrypoint.
  # Declaring them here made wiring-liveness false-flag them as "missing"
  # forever (see orchestrator issue #2519).
  - unit: hydra-betting-arbitrage-recovery.timer
    type: timer
    maxStaleMinutes: 60
    description: Arbitrage recovery loop.
  - unit: hydra-betting-nba-injuries.timer
    type: timer
    maxStaleMinutes: 1560
    description: BallDontLie NBA injury sync — daily; first fire may be NOT-YET-FIRED.
  - unit: hydra-betting-forecast-outcomes.timer
    type: timer
    maxStaleMinutes: 1560
    description: Forecast-outcome settlement loop (calibration/brier feed).

  # Output checks (slice 2, #2288) — live-but-inert detection.
  #
  # Seed: the scanner funnel registry gate. The registry-seed bug zeroed
  # funnelBreakdown.registryPairs while the scan loop kept running on schedule
  # (the exact live-but-inert mode this check exists for). A floor of value:0
  # over runs:3 flags only a source pinned at zero registry pairs across three
  # consecutive scans; the first non-zero scan clears it.
  - type: output
    source: /api/scanner/latest
    jsonPath: funnelBreakdown.registryPairs
    minOverRuns:
      value: 0
      runs: 3
    description: Scanner funnel registry gate — must produce >0 registry pairs (registry-seed regression guard).
