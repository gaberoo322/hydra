# Hydra Redis persistence config

# AOF — primary persistence, syncs every second
appendonly yes
appendfsync everysec

# Auto-rewrite AOF when it doubles in size (min 16MB)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 16mb

# RDB snapshots — backup safety net
save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 768mb
maxmemory-policy noeviction
