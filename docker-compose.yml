services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra
      POSTGRES_DB: hydra
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  vikingdb:
    image: ghcr.io/volcengine/openviking:main
    command: python3 -m uvicorn openviking.storage.vectordb.service.server_fastapi:app --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - vikingdb-data:/app/vikingdb_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  openviking:
    init: true
    image: ghcr.io/volcengine/openviking:main
    ports:
      - "1933:1933"
    volumes:
      - openviking-data:/app/workspace
      - ./docker/ov.conf:/app/ov.conf:ro
      - /home/gabe/hydra/config:/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Local Ollama (gaming PC) over Tailnet — serves OV's embedding + vlm
      # backends. Container has no MagicDNS, so map the Tailscale IP here and
      # reference the hostname in docker/ov.conf. See ADR / hydra-doctor 2026-06-05.
      - "gabes-desktop-1:100.69.55.127"
    environment:
      - OPENVIKING_CONFIG_FILE=/app/ov.conf
    depends_on:
      - redis
      - vikingdb
    # Overrides the image's HEALTHCHECK (5s timeout). OV's /health answers in
    # <5ms when idle, but the event loop blocks ~12-15s during each
    # hierarchical-retrieval burst (every ~16-20s under load), so the image
    # default flags a busy-but-healthy container unhealthy (issue #1755).
    # 30s timeout tolerates a full burst; 3 retries means only ~2min of solid
    # unresponsiveness marks real degradation. curl --max-time 25 keeps curl's
    # own deadline inside Docker's 30s so failures exit 1 instead of SIGKILL.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 25 http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  openviking-data:
    driver: local
  vikingdb-data:
    driver: local
