services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra
      POSTGRES_DB: hydra
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  vikingdb:
    image: ghcr.io/volcengine/openviking:main
    command: python3 -m uvicorn openviking.storage.vectordb.service.server_fastapi:app --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - vikingdb-data:/app/vikingdb_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # Local CPU Ollama on the hydra-server, serving ONLY the dense embedding
  # model (nomic-embed-text, 768-dim). This removes OpenViking's hot search
  # path from its hard dependency on the gaming PC (gabes-desktop-1): when the
  # gaming PC is offline, embeddings (and therefore searchKnowledge / text
  # indexing) stay up locally; only the VLM-dependent image/document indexing
  # degrades. The heavy GPU-bound VLM (gemma4:e4b) intentionally stays on the
  # gaming PC. See docs/reference.md "OpenViking embedding/VLM backend split"
  # and issue #1795. The nomic-embed-text model is ~270MB and runs fine on the
  # hydra-server's CPU (8 cores / 62GB, no GPU).
  #
  # BRING-UP CONTRACT (issue #1812): start the stack with a bare
  # `docker compose up -d` (NO service argument). `openviking` declares
  # `depends_on: ollama-embed (condition: service_healthy)` below, so a full
  # bring-up always pulls this service in. A targeted `docker compose up -d
  # openviking` ALSO honours that dependency — but a targeted bring-up of any
  # OTHER service (e.g. `up -d postgres`) will NOT create ollama-embed, leaving
  # OpenViking's hot embedding path with an unreachable backend and a failing
  # health probe. `restart: unless-stopped` only re-honours an already-created
  # container across host reboots; it does not create the container on first
  # bring-up. /hydra-doctor detects a missing ollama-embed and re-creates it.
  ollama-embed:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ollama-embed-data:/root/.ollama
      - ./docker/ollama-embed-entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      # Healthy only once the embedding model is actually pulled and loadable —
      # /api/tags lists locally-available models; grep ensures the pull landed.
      test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6G

  openviking:
    init: true
    image: ghcr.io/volcengine/openviking:main
    ports:
      - "1933:1933"
    volumes:
      - openviking-data:/app/workspace
      - ./docker/ov.conf:/app/ov.conf:ro
      - /home/gabe/hydra/config:/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # Local Ollama (gaming PC) over Tailnet — serves OV's VLM backend only
      # now (embedding moved to the local ollama-embed service, issue #1795).
      # Container has no MagicDNS, so map the Tailscale IP here and reference
      # the hostname in docker/ov.conf. See ADR / hydra-doctor 2026-06-05.
      - "gabes-desktop-1:100.69.55.127"
    environment:
      - OPENVIKING_CONFIG_FILE=/app/ov.conf
    depends_on:
      redis:
        condition: service_started
      vikingdb:
        condition: service_started
      # Wait for the local embedding server to have pulled the model before OV
      # starts trying to embed — avoids a cold-start window where the hot search
      # path errors while the model is still downloading.
      ollama-embed:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  openviking-data:
    driver: local
  vikingdb-data:
    driver: local
  ollama-embed-data:
    driver: local
